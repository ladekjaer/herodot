{% extends "base.html" %}
{% block content %}
<h1>Records</h1>
<table>
    <thead>
    <tr>
        <th>Record ID</th>
        <th>Timestamp</th>
        <th>Reading</th>
    </tr>
    </thead>
    <tbody>
    {% for record in records %}
    <tr>
        <td>{{ record.id }}</td>
        <td>{{ record.timestamp }}</td>
        <td>{{ record.reading }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock content %}
